<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영화 목록 - CineFeel</title>

    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/movie.css?v=30">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>

<body>
<div class="container">

    <header class="navbar">
        <a href="/" class="logo">Cine<span>Feel</span></a>

        <nav>

            <a href="/html/list.html">영화목록</a>
        </nav>

        <div class="nav-icons">
            <a href="/html/login.html">로그인</a>

    <section class="movie-page">

        <div class="movie-header">
            <div>
                <h1>🎬 영화 목록</h1>

                <button type="submit">검색</button>
            </form>
        </div>

        <div class="movie-grid" id="movieGrid">
            <p style="color:white;">영화 목록을 불러오는 중입니다...</p>
        </div>

        <div class="pagination" id="pagination"></div>

<script src="/js/movie.js"></script>

</html>
