<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFeel 회원가입</title>

    <link rel="stylesheet" href="/css/signup.css">
</head>

<body>

<div class="signup-page">

    <div class="dark-overlay"></div>

    <a href="/html/index.html" class="logo">
        CineFeel
    </a>

    <main class="signup-box">

        <h1>회원가입</h1>

        <p class="sub-text">
            나만의 영화 취향을 분석하고 감성 기반 추천을 받아보세요.
        </p>

        <p id="signupMessage" style="color:red; margin-bottom:10px; display:none;"></p>

        <form id="signupForm">

            <div class="input-group">
                <label for="username">이름</label>
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="이름을 입력하세요"
                       required>
            </div>

            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="이메일을 입력하세요"
                       required>
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="비밀번호를 입력하세요"
                       required>
            </div>

            <div class="input-group">
                <label for="passwordCheck">비밀번호 확인</label>
                <input type="password"
                       id="passwordCheck"
                       name="passwordCheck"
                       placeholder="비밀번호를 다시 입력하세요"
                       required>
            </div>

            <p class="genre-title">선호 장르</p>

            <div class="genre-list">

                <label>
                    <input type="checkbox" name="genres" value="액션">
                    <span>액션</span>
                </label>

                <label>
                    <input type="checkbox" name="genres" value="로맨스">
                    <span>로맨스</span>
                </label>

                <label>
                    <input type="checkbox" name="genres" value="SF">
                    <span>SF</span>
                </label>

                <label>
                    <input type="checkbox" name="genres" value="스릴러">
                    <span>스릴러</span>
                </label>

                <label>
                    <input type="checkbox" name="genres" value="코미디">
                    <span>코미디</span>
                </label>

                <label>
                    <input type="checkbox" name="genres" value="드라마">
                    <span>드라마</span>
                </label>

            </div>

            <button type="submit" class="signup-btn">
                회원가입
            </button>

        </form>

        <p class="login-text">
            이미 계정이 있나요?
            <a href="/html/login.html">로그인</a>
        </p>

    </main>

</div>

<script src="/js/signup.js"></script>

</body>
</html>
