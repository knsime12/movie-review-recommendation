<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFeel 로그인</title>

    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="login-page">

    <div class="dark-overlay"></div>

    <a href="/" class="logo">
        Cine<span>Feel</span>
    </a>

    <main class="login-box">

        <h1>로그인</h1>

        <p class="sub-text">
            리뷰 감성을 분석하고<br>
            취향에 맞는 영화를 추천받아보세요.
        </p>

        <p id="loginMessage" style="color:red; margin-bottom:15px; display:none;">
            이메일 또는 비밀번호가 올바르지 않습니다.
        </p>

        <form id="loginForm">

            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="이메일을 입력하세요"
                       required>
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="비밀번호를 입력하세요"
                       required>
            </div>

            <button type="submit" class="login-btn">
                로그인
            </button>

            <div class="login-options">
                <label>
                    <input type="checkbox">
                    로그인 상태 유지
                </label>

                <a href="#">비밀번호 찾기</a>
            </div>

        </form>

        <p class="signup-text">
            아직 계정이 없나요?
            <a href="/html/signup.html">회원가입</a>
        </p>

    </main>

</div>

</body>
</html>
