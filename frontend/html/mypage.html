<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마이페이지 - CineFeel</title>

    <link rel="stylesheet" href="/css/mypage.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

<div class="mypage-wrap">

    <aside class="mypage-sidebar">

        <a href="/html/index.html" class="sidebar-logo">
            CineFeel
        </a>

        <ul class="menu-list">

            <li>
                <button class="menu-btn active" onclick="showTab(event, 'profile')">
                    <span class="menu-icon">◉</span>
                    <span>내 정보</span>
                </button>
            </li>

            <li>
                <button class="menu-btn" onclick="showTab(event, 'writtenReviews')">
                    <span class="menu-icon">✎</span>
                    <span>작성한 리뷰</span>
                </button>
            </li>

            <li>
                <button class="menu-btn" onclick="showTab(event, 'recommendedMovies')">
                    <span class="menu-icon">✿</span>
                    <span>추천 받은 영화</span>
                </button>
            </li>

            <li>
                <button class="menu-btn" onclick="showTab(event, 'genre')">
                    <span class="menu-icon">◇</span>
                    <span>선호 장르</span>
                </button>
            </li>

            <li style="margin-top:18px;">
                <a href="/html/login.html" style="text-decoration:none;">
                    <button class="menu-btn" type="button">
                        <span class="menu-icon">↩</span>
                        <span>로그아웃</span>
                    </button>
                </a>
            </li>

        </ul>

    </aside>

    <main class="mypage-content">

        <section id="profile" class="content-section active-section">

            <h2>내 정보</h2>

            <div class="profile-card">

                <div class="profile-image">👤</div>

                <div class="profile-info">

                    <h3 id="userName">사용자</h3>
                    <p id="userEmail">user@email.com</p>

                    <div class="profile-tags">
                        <span>긍정 리뷰 <strong id="positiveCount">0</strong>개</span>
                        <span>부정 리뷰 <strong id="negativeCount">0</strong>개</span>
                    </div>

                </div>

            </div>

        </section>

        <section id="writtenReviews" class="content-section">

            <h2>작성한 리뷰</h2>

            <p class="section-desc">
                내가 작성한 리뷰와 감성 분석 결과를 확인할 수 있어요.
            </p>

            <div class="review-summary-grid">

                <div class="summary-card positive-card">
                    <span>긍정 리뷰</span>
                    <strong id="positiveReviewSummary">0개</strong>
                </div>

                <div class="summary-card negative-card">
                    <span>부정 리뷰</span>
                    <strong id="negativeReviewSummary">0개</strong>
                </div>

            </div>

            <div id="myReviewList" class="my-review-card">
                <p>아직 작성한 리뷰가 없습니다.</p>
            </div>

        </section>

        <section id="recommendedMovies" class="content-section">

            <h2>추천 받은 영화</h2>

            <p class="section-desc">
                내가 작성한 리뷰 감성을 기반으로 추천된 영화예요.
            </p>

            <div id="myRecommendList" class="my-review-card">
                <p>아직 추천된 영화가 없습니다. 리뷰를 작성하면 영화가 추천돼요!</p>
            </div>

        </section>

        <section id="genre" class="content-section">

            <h2>선호 장르</h2>

            <p class="section-desc">
                추천에 활용되는 선호 장르예요.
            </p>

            <div class="genre-card" id="genreList">
                <span>SF</span>
                <span>드라마</span>
            </div>

        </section>

    </main>

</div>

<script src="/js/mypage.js?v=1"></script>

</body>
</html>
