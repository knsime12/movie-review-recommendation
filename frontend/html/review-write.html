<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리뷰 작성 - CineFeel</title>

    <link rel="stylesheet" href="/css/review-write.css">
    <link rel="stylesheet" href="/css/navbar.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="/html/index.html" class="logo">CineFeel</a>

            <nav class="nav-menu">
                <a href="/html/index.html">홈</a>
                <a href="/html/list.html">영화목록</a>
            </nav>
        </div>

        <div class="nav-right auth-menu">
            <a href="/html/login.html">로그인</a>
            <a href="/html/signup.html">회원가입</a>
        </div>
    </header>

<div class="review-container">
    <div class="review-card">

        <div class="movie-info">
            <img id="moviePoster" src="" alt="영화 포스터">

            <div class="movie-text">
                <h2 id="movieTitle">영화 제목</h2>

                <p>
                    <span id="movieGenre">장르</span>
                    /
                    <span id="movieReleaseDate">개봉일</span>
                </p>

                <div class="movie-rating">
                    ⭐ <span id="movieRating">4.5</span>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <h3 class="review-title">리뷰를 작성해주세요</h3>

        <p class="review-sub">
            이 영화는 어떤 느낌이었나요?
        </p>

        <form id="reviewForm">
            <div class="review-box">
                <textarea id="reviewContent"
                          maxlength="500"
                          required
                          placeholder="영화를 보고 느낀 감정을 자유롭게 작성해주세요."></textarea>
            </div>

            <p class="notice">
                ⓘ 욕설, 비방, 스포일러는 제한될 수 있어요.
            </p>

            <button type="submit" class="analyze-btn">
                감성 분석하기
            </button>
        </form>

    </div>
</div>

<script src="/js/review-write.js?v=2"></script>
</body>
</html>
