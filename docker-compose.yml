services:
  mysql:
    image: mysql:8.0
    container_name: cinefeel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: cinefeel
    ports:
    - "3307:3306"
    volumes:
    - cinefeel_mysql_data:/var/lib/mysql
    - ./backend/scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
    - --character-set-server=utf8mb4
    - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinefeel-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: cinefeel
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EXPLANATION_MODEL: ${OPENAI_EXPLANATION_MODEL:-gpt-5.4-nano}
    ports:
      - "8000:8000"

volumes:
  cinefeel_mysql_data: